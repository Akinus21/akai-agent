name: Cross-Platform Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: akai-agent-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: akai-agent-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: akai-agent-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: akai-agent-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: akai-agent-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64-linux cross deps
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" \
            >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/akai-agent"
          [ -f "${SRC}.exe" ] && SRC="${SRC}.exe"
          cp "$SRC" "${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Notify webhook — failure
        if: failure()
        env:
          WEBHOOK_HMAC_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ERROR_TEXT="Cross-platform build failed for ${{ matrix.target }}"
          printf '%s' "$(printf '%s' "$ERROR_TEXT" | jq -Rn \
            --arg event   "build_failure" \
            --arg repo    "${{ github.repository }}" \
            --arg run_url "$RUN_URL" \
            --arg sha     "${{ github.sha }}" \
            --arg ref     "${{ github.ref_name }}" \
            --arg actor   "${{ github.actor }}" \
            '{event:$event,repo:$repo,run_url:$run_url,sha:$sha,ref:$ref,actor:$actor,error:[inputs]|join("\n")}')" > /tmp/webhook-payload.json
          SIG=$(openssl dgst -sha256 -hmac "$WEBHOOK_HMAC_SECRET" /tmp/webhook-payload.json | awk '{print "sha256="$2}')
          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_failure" \
            -H "X-Hub-Signature-256: $SIG" \
            --data-binary @/tmp/webhook-payload.json \
            "https://webhook.akinus21.com/webhook/akai-net-build" || true

  build-rpc-vulkan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vulkan SDK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake gcc g++ git wget libvulkan-dev spirv-tools glslang-tools glslc libshaderc-dev mesa-vulkan-drivers

      - name: Clone llama.cpp
        run: |
          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git /tmp/llama.cpp

      - name: Build rpc-server with Vulkan
        run: |
          cd /tmp/llama.cpp
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DGGML_RPC=ON -DGGML_VULKAN=ON
          cmake --build . --config Release -j$(nproc)

      - name: Bundle rpc-server + libraries
        run: |
          mkdir -p /tmp/rpc-bundle/lib
          cp /tmp/llama.cpp/build/bin/rpc-server /tmp/rpc-bundle/ 2>/dev/null || true
          cp /tmp/llama.cpp/build/bin/llama-rpc-server /tmp/rpc-bundle/ 2>/dev/null || true

          for dir in /tmp/llama.cpp/build/bin /tmp/llama.cpp/build; do
            for f in "$dir"/libggml*.so "$dir"/libggml*.so.*; do
              [ -f "$f" ] && cp "$f" /tmp/rpc-bundle/lib/ 2>/dev/null || true
            done
          done

          echo "=== Bundling Vulkan runtime libraries ==="
          for dir in /usr/lib/x86_64-linux-gnu /usr/lib64 /usr/local/lib; do
            for f in "$dir"/libvulkan.so* "$dir"/libMesaVK*.so*; do
              [ -f "$f" ] && cp -L "$f" /tmp/rpc-bundle/lib/ 2>/dev/null || true
            done
          done

          echo "=== Bundle contents ==="
          ls -la /tmp/rpc-bundle/
          echo "=== Bundle libs ==="
          ls -la /tmp/rpc-bundle/lib/

      - name: Create archive
        run: |
          cd /tmp/rpc-bundle
          FILES=""
          [ -f rpc-server ] && FILES="$FILES rpc-server"
          [ -f llama-rpc-server ] && FILES="$FILES llama-rpc-server"
          tar czf /tmp/akai-agent-rpc-vulkan-linux-x86_64.tar.gz $FILES lib/

      - uses: actions/upload-artifact@v4
        with:
          name: akai-agent-rpc-vulkan-linux-x86_64
          path: /tmp/akai-agent-rpc-vulkan-linux-x86_64.tar.gz

  build-rpc-cuda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA toolkit 12.4
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake gcc g++ git wget
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb -O /tmp/cuda-keyring.deb
          sudo dpkg -i /tmp/cuda-keyring.deb
          sudo apt-get update -qq
          sudo apt-get install -y cuda-toolkit-12-4

      - name: Clone llama.cpp
        run: |
          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git /tmp/llama.cpp

      - name: Build rpc-server with CUDA
        run: |
          cd /tmp/llama.cpp
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DGGML_RPC=ON -DGGML_CUDA=ON \
            -DCUDAToolkit_ROOT=/usr/local/cuda-12.4
          cmake --build . --config Release -j$(nproc)

      - name: Bundle rpc-server + libraries
        run: |
          mkdir -p /tmp/rpc-bundle/lib
          cp /tmp/llama.cpp/build/bin/rpc-server /tmp/rpc-bundle/ 2>/dev/null || true
          cp /tmp/llama.cpp/build/bin/llama-rpc-server /tmp/rpc-bundle/ 2>/dev/null || true

          for dir in /tmp/llama.cpp/build/bin /tmp/llama.cpp/build; do
            for f in "$dir"/libggml*.so "$dir"/libggml*.so.*; do
              [ -f "$f" ] && cp "$f" /tmp/rpc-bundle/lib/
            done
          done

          echo "=== Bundling CUDA runtime libraries ==="
          ldd /tmp/rpc-bundle/rpc-server 2>/dev/null | grep -E 'cuda|cublas|cufft|curand|cusparse|cusolver|nvrtc|cublasLt|cudart' | awk '{print $1}' | while read lib; do
            found=false
            for search_dir in /usr/local/cuda/lib64 /usr/local/cuda/lib64 /usr/lib/x86_64-linux-gnu /usr/lib64 /lib/x86_64-linux-gnu; do
              if [ -f "$search_dir/$lib" ]; then
                cp -L "$search_dir/$lib" /tmp/rpc-bundle/lib/
                found=true
                break
              fi
            done
            if [ "$found" = false ]; then
              locate "$lib" 2>/dev/null | head -1 | xargs -I{} cp -L "{}" /tmp/rpc-bundle/lib/ 2>/dev/null || true
              find / -name "$lib" -type f 2>/dev/null | head -1 | xargs -I{} cp -L "{}" /tmp/rpc-bundle/lib/ 2>/dev/null || true
            fi
          done

          for f in /tmp/rpc-bundle/lib/*; do
            case "$(basename "$f")" in
              *.so.*)
                SOBASE=$(echo "$f" | sed 's/\(\.so\)\..*/\1/')
                [ ! -L "$SOBASE" ] && [ -f "$SOBASE" ] && ln -sf "$(basename "$f")" "$SOBASE"
                ;;
            esac
          done

          echo "=== Bundle contents ==="
          ls -la /tmp/rpc-bundle/
          echo "=== Bundle libs ==="
          ls -la /tmp/rpc-bundle/lib/
          echo "=== CUDA deps ==="
          ldd /tmp/rpc-bundle/rpc-server 2>/dev/null | grep -E 'cuda|cublas|cufft|curand|cusparse|cusolver|nvrtc|libggml' || true
          echo "=== Checking CUDA dependencies ==="
          ldd /tmp/rpc-bundle/rpc-server 2>/dev/null || ldd /tmp/rpc-bundle/llama-rpc-server 2>/dev/null || true

      - name: Create archive
        run: |
          cd /tmp/rpc-bundle
          FILES=""
          [ -f rpc-server ] && FILES="$FILES rpc-server"
          [ -f llama-rpc-server ] && FILES="$FILES llama-rpc-server"
          tar czf /tmp/akai-agent-rpc-cuda-linux-x86_64.tar.gz $FILES lib/

      - uses: actions/upload-artifact@v4
        with:
          name: akai-agent-rpc-cuda-linux-x86_64
          path: /tmp/akai-agent-rpc-cuda-linux-x86_64.tar.gz

  release:
    needs: [build, build-rpc-cuda, build-rpc-vulkan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect artifacts
        run: |
          cp artifacts/akai-agent-linux-x86_64/akai-agent ./akai-agent-linux-x86_64
          cp artifacts/akai-agent-linux-aarch64/akai-agent ./akai-agent-linux-aarch64 2>/dev/null || true
          cp artifacts/akai-agent-macos-x86_64/akai-agent ./akai-agent-macos-x86_64 2>/dev/null || true
          cp artifacts/akai-agent-macos-aarch64/akai-agent ./akai-agent-macos-aarch64 2>/dev/null || true
          cp artifacts/akai-agent-windows-x86_64/akai-agent.exe ./akai-agent-windows-x86_64.exe 2>/dev/null || true
          cp artifacts/akai-agent-rpc-cuda-linux-x86_64/akai-agent-rpc-cuda-linux-x86_64.tar.gz ./akai-agent-rpc-cuda-linux-x86_64.tar.gz
          cp artifacts/akai-agent-rpc-vulkan-linux-x86_64/akai-agent-rpc-vulkan-linux-x86_64.tar.gz ./akai-agent-rpc-vulkan-linux-x86_64.tar.gz

      - uses: softprops/action-gh-release@v2
        with:
          files: akai-agent-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap — full multi-platform formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          BASE="https://github.com/Akinus21/akai-agent/releases/download/${TAG}"

          SHA_LIN_X64=$(sha256sum akai-agent-linux-x86_64        | awk '{print $1}')
          SHA_LIN_ARM=$(sha256sum akai-agent-linux-aarch64       | awk '{print $1}')
          SHA_MAC_ARM=$(sha256sum akai-agent-macos-aarch64       | awk '{print $1}')
          SHA_MAC_X64=$(sha256sum akai-agent-macos-x86_64        | awk '{print $1}')
          SHA_RPC_CUDA=$(sha256sum akai-agent-rpc-cuda-linux-x86_64.tar.gz | awk '{print $1}')
          SHA_RPC_VULKAN=$(sha256sum akai-agent-rpc-vulkan-linux-x86_64.tar.gz | awk '{print $1}')

          TAP="/tmp/homebrew-tap"
          rm -rf "$TAP"
          git clone \
            "https://x-access-token:${TAP_TOKEN}@github.com/Akinus21/homebrew-tap.git" \
            "$TAP"
          cd "$TAP" && mkdir -p Formula

          cat > Formula/akai-agent.rb <<FORMULA
          class AkaiAgent < Formula
            desc "Remote GPU worker agent for the akai-net distributed inference system"
            homepage "https://github.com/Akinus21/akai-agent"
            version "${VER}"
            license "MIT"

            on_macos do
              on_intel do
                url "${BASE}/akai-agent-macos-x86_64"
                sha256 "${SHA_MAC_X64}"
              end
              on_arm do
                url "${BASE}/akai-agent-macos-aarch64"
                sha256 "${SHA_MAC_ARM}"
              end
            end

            on_linux do
              on_intel do
                url "${BASE}/akai-agent-linux-x86_64"
                sha256 "${SHA_LIN_X64}"
              end
              on_arm do
                url "${BASE}/akai-agent-linux-aarch64"
                sha256 "${SHA_LIN_ARM}"
              end
            end

            resource "rpc-cuda" do
              url "${BASE}/akai-agent-rpc-cuda-linux-x86_64.tar.gz"
              sha256 "${SHA_RPC_CUDA}"
            end

            resource "rpc-vulkan" do
              url "${BASE}/akai-agent-rpc-vulkan-linux-x86_64.tar.gz"
              sha256 "${SHA_RPC_VULKAN}"
            end

            def install
              binary_name = stable.url.split("/").last
              bin.install binary_name => "akai-agent"
              if OS.linux? && Hardware::CPU.intel?
                resource("rpc-cuda").stage do
                  (share/"akai-agent").mkpath
                  cp "rpc-server", "#{share}/akai-agent/rpc-server-cuda" if File.exist?("rpc-server")
                  cp "llama-rpc-server", "#{share}/akai-agent/llama-rpc-server-cuda" if File.exist?("llama-rpc-server")
                  (share/"akai-agent/lib").mkpath
                  cp_r "lib/.", "#{share}/akai-agent/lib/" if File.exist?("lib")
                end
                resource("rpc-vulkan").stage do
                  (share/"akai-agent").mkpath
                  cp "rpc-server", "#{share}/akai-agent/rpc-server-vulkan" if File.exist?("rpc-server")
                  cp "llama-rpc-server", "#{share}/akai-agent/llama-rpc-server-vulkan" if File.exist?("llama-rpc-server")
                  (share/"akai-agent/lib").mkpath
                  cp_r "lib/.", "#{share}/akai-agent/lib/" if File.exist?("lib")
                end
              end
            end

            def caveats
              <<~EOS
                Initialize this machine as an akai-net worker:
                  akai-agent init \\
                    --queue https://ollama.akinus21.com \\
                    --key YOUR_WORKER_API_KEY

                Install as a background service:
                  sudo akai-agent install

                Check status:
                  akai-agent status

                Windows (native): download akai-agent-windows-x86_64.exe from
                  https://github.com/Akinus21/akai-agent/releases/latest
              EOS
            end

            test do
              assert_match "akai-agent", shell_output("#{bin}/akai-agent --help")
            end
          end
          FORMULA

          git config user.email "iron-bot@akinus21.com"
          git config user.name "Iron Bot"
          git add Formula/akai-agent.rb
          git commit -m "Update akai-agent to ${TAG} (all platforms + rpc-cuda + rpc-vulkan)"
          git push origin master

      - name: Notify webhook — failure
        if: failure()
        env:
          WEBHOOK_HMAC_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ERROR_TEXT="Release job failed"
          printf '%s' "$(printf '%s' "$ERROR_TEXT" | jq -Rn \
            --arg event   "build_failure" \
            --arg repo    "${{ github.repository }}" \
            --arg run_url "$RUN_URL" \
            --arg sha     "${{ github.sha }}" \
            --arg ref     "${{ github.ref_name }}" \
            --arg actor   "${{ github.actor }}" \
            '{event:$event,repo:$repo,run_url:$run_url,sha:$sha,ref:$ref,actor:$actor,error:[inputs]|join("\n")}')" > /tmp/webhook-payload.json
          SIG=$(openssl dgst -sha256 -hmac "$WEBHOOK_HMAC_SECRET" /tmp/webhook-payload.json | awk '{print "sha256="$2}')
          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_failure" \
            -H "X-Hub-Signature-256: $SIG" \
            --data-binary @/tmp/webhook-payload.json \
            "https://webhook.akinus21.com/webhook/akai-net-build" || true

      - name: Notify webhook — success
        if: success()
        env:
          WEBHOOK_HMAC_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TAG="${{ github.ref_name }}"
          printf '%s' "$(jq -cn \
            --arg event  "build_success" \
            --arg repo   "${{ github.repository }}" \
            --arg run_url "$RUN_URL" \
            --arg sha    "${{ github.sha }}" \
            --arg ref    "${{ github.ref_name }}" \
            --arg actor  "${{ github.actor }}" \
            --arg tag    "$TAG" \
            '{event:$event,repo:$repo,run_url:$run_url,sha:$sha,ref:$ref,actor:$actor,tag:$tag}')" > /tmp/webhook-payload.json
          SIG=$(openssl dgst -sha256 -hmac "$WEBHOOK_HMAC_SECRET" /tmp/webhook-payload.json | awk '{print "sha256="$2}')
          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_success" \
            -H "X-Hub-Signature-256: $SIG" \
            --data-binary @/tmp/webhook-payload.json \
            "https://webhook.akinus21.com/webhook/akai-net-build"