name: Webhook Notification

on:
  workflow_run:
    workflows: ["Build and Release"]
    types: [completed]

permissions:
  actions: read

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download build logs
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          name: build-logs
          path: /tmp/logs
        continue-on-error: true

      - name: Collect logs from GitHub API
        run: |
          LOG_FILE=""
          for f in /tmp/logs/build.log /tmp/logs/build-errors.txt; do
            if [ -f "$f" ] && [ -s "$f" ]; then
              LOG_FILE="$f"
              break
            fi
          done
          if [ -z "$LOG_FILE" ]; then
            mkdir -p /tmp/logs
            RUN_ID="${{ github.event.workflow_run.id }}"
            # Get logs via GitHub API - fetch full run logs as plain text
            if ! gh run view "$RUN_ID" --log-failed 2>/dev/null > /tmp/logs/build.log; then
              echo "Failed to fetch logs from GitHub API" > /tmp/logs/build.log
            fi
            LOG_FILE=/tmp/logs/build.log
          fi
          echo "LOG_FILE=$LOG_FILE" >> $GITHUB_ENV
          LINES=$(wc -l < "$LOG_FILE" 2>/dev/null || echo "0")
          echo "LOG_LINES=$LINES" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload full logs to pasty (with retries)
        id: pasty
        run: |
          LOG_FILE="${{ env.LOG_FILE }}"
          if [ ! -f "$LOG_FILE" ] || [ ! -s "$LOG_FILE" ]; then
            echo "pasty_ids=" >> $GITHUB_OUTPUT
            echo "pasty_url=https://paste.akinus21.com/no-logs" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Get content - if too large, upload in chunks using line ranges
          TOTAL_LINES=$(wc -l < "$LOG_FILE" 2>/dev/null || echo 0)
          TOTAL_LINES=${TOTAL_LINES:-0}
          echo "Log file has $TOTAL_LINES lines"
          
          if [ "$TOTAL_LINES" -le 0 ]; then
            echo "pasty_ids=no-content" >> $GITHUB_OUTPUT
            echo "pasty_url=https://paste.akinus21.com/no-logs" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          PASTY_IDS=""
          CHUNK_SIZE=2000
          START=1
          
          while [ $START -le $TOTAL_LINES ]; do
            END=$((START + CHUNK_SIZE - 1))
            [ $END -gt $TOTAL_LINES ] && END=$TOTAL_LINES
            
            CHUNK=$(sed -n "${START},${END}p" "$LOG_FILE" 2>/dev/null || echo "")
            [ -z "$CHUNK" ] && START=$((END + 1)) && continue
            
            # Escape for JSON - use python if available, otherwise manual escaping
            if command -v python3 &> /dev/null; then
              CHUNK_ESCAPED=$(python3 -c "import json; print(json.dumps('''$CHUNK'''))" 2>/dev/null)
            else
              CHUNK_ESCAPED=$(printf '%s' "$CHUNK" | jq -Rs '.' 2>/dev/null)
            fi
            
            PAYLOAD=$(jq -n --argjson content "$CHUNK_ESCAPED" '{content: $content}' 2>/dev/null)
            
            if [ -z "$PAYLOAD" ] || [ "$PAYLOAD" = "null" ]; then
              echo "Failed to create JSON payload for lines $START-$END"
              START=$((END + 1))
              continue
            fi
            
            PASTE_ID=""
            for i in $(seq 1 30); do
              RESPONSE=$(printf '%s' "$PAYLOAD" | curl -sS -X POST \
                -H "Content-Type: application/json" \
                -d @- \
                "https://paste.akinus21.com/api/v2/pastes" 2>/dev/null)
              PASTE_ID=$(printf '%s' "$RESPONSE" | jq -r '.id // empty' 2>/dev/null)
              if [ -n "$PASTE_ID" ] && [ "$PASTE_ID" != "null" ]; then
                echo "Uploaded lines $START-$END -> $PASTE_ID"
                break
              fi
              echo "Pasty upload attempt $i failed for lines $START-$END, retrying in 3s..."
              sleep 3
            done
            [ -n "$PASTE_ID" ] && [ "$PASTE_ID" != "null" ] && PASTY_IDS="${PASTY_IDS}${PASTY_IDS:+,}$PASTE_ID"
            START=$((END + 1))
          done
          
          if [ -z "$PASTY_IDS" ]; then
            PASTY_IDS="upload-failed"
          fi
          echo "pasty_ids=$PASTY_IDS" >> $GITHUB_OUTPUT
          FIRST_ID="${PASTY_IDS%%,*}"
          echo "pasty_url=https://paste.akinus21.com/${FIRST_ID}" >> $GITHUB_OUTPUT

      - name: Extract error context (max 25 lines)
        id: errors
        run: |
          LOG_FILE="${{ env.LOG_FILE }}"
          if [ -z "$LOG_FILE" ] || [ ! -f "$LOG_FILE" ] || [ ! -s "$LOG_FILE" ]; then
            echo "error_context=Build failed. No detailed logs available." >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Find error lines with better patterns
          ERROR_LINES=$(grep -n -iE '^error\[E[0-9]+\]|^error:|fatal error|cannot find|undefined|expected.*but found|not found in this scope|unresolved|compilation failed|build failed' "$LOG_FILE" 2>/dev/null | head -5 | cut -d: -f1)
          
          if [ -z "$ERROR_LINES" ]; then
            # No rustc errors found, just take last 25 lines of build output
            CONTEXT=$(tail -25 "$LOG_FILE" 2>/dev/null)
          else
            # Extract context around each error (up to 3 lines before/after each)
            CONTEXT=""
            for LINE in $ERROR_LINES; do
              START=$((LINE - 3))
              END=$((LINE + 3))
              [ $START -lt 1 ] && START=1
              CHUNK=$(sed -n "${START},${END}p" "$LOG_FILE" 2>/dev/null)
              CONTEXT="${CONTEXT}
--- error near line ${LINE} ---
${CHUNK}"
            done
            # Limit to 25 lines total
            CONTEXT=$(echo "$CONTEXT" | tail -25 | head -25)
          fi
          
          # Final safety: ensure we don't exceed 25 lines
          CONTEXT=$(echo "$CONTEXT" | head -25)
          
          echo "error_context<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTEXT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Notify webhook — failure
        env:
          WEBHOOK_HMAC_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          RUN_URL="https://github.com/${{ github.event.workflow_run.repository.full_name }}/actions/runs/${{ github.event.workflow_run.id }}"
          PASTY_IDS="${{ steps.pasty.outputs.pasty_ids }}"
          PASTY_URL="${{ steps.pasty.outputs.pasty_url }}"
          ERROR_CONTEXT="${{ steps.errors.outputs.error_context }}"
          
          # Build pasty URLs list
          PASTY_URLS=""
          IFS=',' read -ra IDS <<< "$PASTY_IDS"
          for id in "${IDS[@]}"; do
            [ -n "$id" ] && PASTY_URLS="${PASTY_URLS}${PASTY_URLS:+,}{\"url\":\"https://paste.akinus21.com/${id}\"}"
          done
          
          printf '%s' "$(printf '%s' "$ERROR_CONTEXT" | jq -Rn \
            --arg event     "build_failure" \
            --arg repo      "${{ github.event.workflow_run.repository.full_name }}" \
            --arg run_url   "$RUN_URL" \
            --arg sha       "${{ github.event.workflow_run.head_sha }}" \
            --arg ref       "${{ github.event.workflow_run.head_branch }}" \
            --arg actor     "${{ github.event.workflow_run.actor.login }}" \
            --arg pasty_url "$PASTY_URL" \
            --arg pasty_ids "$PASTY_IDS" \
            --arg pasty_urls "[$PASTY_URLS]" \
            --arg log_lines "${{ env.LOG_LINES }}" \
            '{event:$event,repo:$repo,run_url:$run_url,sha:$sha,ref:$ref,actor:$actor,pasty_url:$pasty_url,pasty_ids:$pasty_ids,pasty_urls:$pasty_urls,log_lines:$log_lines,error:[inputs]|join("\n")}')" > /tmp/webhook-payload.json
          SIG=$(openssl dgst -sha256 -hmac "$WEBHOOK_HMAC_SECRET" /tmp/webhook-payload.json | awk '{print "sha256="$2}')
          curl -fsSL --retry 30 --retry-delay 2 --retry-all-errors -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_failure" \
            -H "X-Hub-Signature-256: $SIG" \
            --data-binary @/tmp/webhook-payload.json \
            "https://webhook.akinus21.com/webhook/akai-net-build" || true

  notify-success:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify webhook — success
        env:
          WEBHOOK_HMAC_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          RUN_URL="https://github.com/${{ github.event.workflow_run.repository.full_name }}/actions/runs/${{ github.event.workflow_run.id }}"
          TAG="${{ github.event.workflow_run.display_title }}"
          printf '%s' "$(jq -cn \
            --arg event  "build_success" \
            --arg repo   "${{ github.event.workflow_run.repository.full_name }}" \
            --arg run_url "$RUN_URL" \
            --arg sha    "${{ github.event.workflow_run.head_sha }}" \
            --arg ref    "${{ github.event.workflow_run.head_branch }}" \
            --arg actor  "${{ github.event.workflow_run.actor.login }}" \
            --arg tag    "$TAG" \
            '{event:$event,repo:$repo,run_url:$run_url,sha:$sha,ref:$ref,actor:$actor,tag:$tag}')" > /tmp/webhook-payload.json
          SIG=$(openssl dgst -sha256 -hmac "$WEBHOOK_HMAC_SECRET" /tmp/webhook-payload.json | awk '{print "sha256="$2}')
          curl -fsSL --retry 30 --retry-delay 2 --retry-all-errors -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_success" \
            -H "X-Hub-Signature-256: $SIG" \
            --data-binary @/tmp/webhook-payload.json \
            "https://webhook.akinus21.com/webhook/akai-net-build" || true