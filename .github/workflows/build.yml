name: Build Binary

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    if: github.event_name == 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Build
        run: |
          set -euo pipefail
          : > build.log
          cargo build --release --bin akai-agent 2>&1 | tee build.log

      - name: Verify binary
        run: |
          B="target/release/akai-agent"
          [ ! -f "$B" ] && echo "ERROR: binary missing" && exit 1
          SIZE=$(stat -c%s "$B")
          [ "$SIZE" -lt 100000 ] && echo "ERROR: binary too small ($SIZE bytes)" && exit 1
          echo "Binary OK ($SIZE bytes)"

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: akai-agent-linux-x86_64
          path: target/release/akai-agent
          if-no-files-found: error
          retention-days: 5

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
          retention-days: 5

      - name: Upload release asset
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          BINARY="target/release/akai-agent"
          SHA256=$(sha256sum "$BINARY" | awk '{print $1}')
          ASSET_ID=$(gh release view --json 'assets' --jq '.assets[] | select(.name == "akai-agent") | .id' latest 2>/dev/null || echo "")
          if [ -n "$ASSET_ID" ]; then
            gh release delete-asset latest "akai-agent" --yes 2>/dev/null || true
          fi
          gh release upload latest "$BINARY" --clobber 2>/dev/null || true

  webhook-failure:
    needs: [build]
    if: failure()
    runs-on: ubuntu-latest
    name: Webhook Notification for Build #${{ github.run_number }}
    steps:
      - name: Download build logs
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.run_id }}
          name: build-logs
          path: /tmp/logs
        continue-on-error: true

      - name: Collect logs
        run: |
          LOG_FILE=""
          for f in /tmp/logs/build.log /tmp/logs/build-errors.txt; do
            if [ -f "$f" ] && [ -s "$f" ]; then
              LOG_FILE="$f"
              break
            fi
          done
          if [ -z "$LOG_FILE" ]; then
            mkdir -p /tmp/logs
            echo "No build logs available" > /tmp/logs/build.log
            LOG_FILE=/tmp/logs/build.log
          fi
          echo "LOG_FILE=$LOG_FILE" >> $GITHUB_ENV
          LINES=$(wc -l < "$LOG_FILE" 2>/dev/null || echo 0)
          echo "LOG_LINES=$LINES" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to pasty
        id: pasty
        run: |
          python3 -c "$(echo '' | base64 -d)"

      - name: Extract errors (max 25 lines)
        id: errors
        run: |
          LOG_FILE="${{ env.LOG_FILE }}"
          if [ -z "$LOG_FILE" ] || [ ! -f "$LOG_FILE" ] || [ ! -s "$LOG_FILE" ]; then
            echo "error_context=Build failed. No logs available." >> $GITHUB_OUTPUT
            exit 0
          fi
          
          ERRORS=$(grep -n -iE 'error\[E[0-9]+\]|error:|fatal|cannot find|not found|compilation failed' \
            "$LOG_FILE" 2>/dev/null | head -5 | cut -d: -f1 | tr '\n' ' ')
          
          if [ -z "$ERRORS" ]; then
            CONTEXT=$(tail -25 "$LOG_FILE" 2>/dev/null)
          else
            CONTEXT=""
            for LINE in $ERRORS; do
              START=$((LINE - 3))
              [ $START -lt 1 ] && START=1
              CHUNK=$(sed -n "${START},$((LINE + 3))p" "$LOG_FILE" 2>/dev/null)
              CONTEXT="${CONTEXT}--- error near line ${LINE} ---\n${CHUNK}\n"
            done
            CONTEXT=$(echo -e "$CONTEXT" | tail -25)
          fi
          
          echo "error_context<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTEXT" | head -25 >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send webhook
        env:
          WEBHOOK_HMAC_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          PASTY_URL: ${{ steps.pasty.outputs.pasty_url }}
          BUILD_NUM: ${{ github.run_number }}
          ERROR_CTX: ${{ steps.errors.outputs.error_context }}
        run: |
          jq -n \
            --arg event "build_failure" \
            --arg repo "$REPO" \
            --arg run_url "$RUN_URL" \
            --arg sha "$SHA" \
            --arg ref "$REF" \
            --arg actor "$ACTOR" \
            --arg pasty_url "$PASTY_URL" \
            --arg build_num "$BUILD_NUM" \
            --arg error "$ERROR_CTX" \
            '{event:$event,repo:$repo,run_url:$run_url,sha:$sha,ref:$ref,actor:$actor,pasty_url:$pasty_url,build_num:$build_num,error:$error}' > /tmp/payload.json
          SIG=$(openssl dgst -sha256 -hmac "$WEBHOOK_HMAC_SECRET" /tmp/payload.json | awk '{print "sha256="$2}')
          curl -fsSL --retry 30 -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_failure" \
            -H "X-Hub-Signature-256: $SIG" \
            --data-binary @/tmp/payload.json \
            "https://webhook.akinus21.com/webhook/akai-agent-build" || true

  release:
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    name: Release for Build #${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || github.token }}

      - uses: actions/download-artifact@v4
        with:
          name: akai-agent-linux-x86_64
          path: .

      - name: Setup
        run: |
          chmod +x ./akai-agent
          SHA256=$(sha256sum ./akai-agent | awk '{print $1}')
          echo "SHA256=$SHA256" >> $GITHUB_ENV

      - name: Compute version
        id: version
        run: |
          git fetch --tags --prune-tags 2>/dev/null || true
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VER="${PREV#v}"
          MAJ=$(echo "$VER" | cut -d. -f1 | sed 's/^0*//'); MAJ=${MAJ:-0}
          MIN=$(echo "$VER" | cut -d. -f2 | sed 's/^0*//'); MIN=${MIN:-0}
          PAT=$(echo "$VER" | cut -d. -f3 | sed 's/^0*//'); PAT=${PAT:-0}
          while git rev-parse "v${MAJ}.${MIN}.${PAT}" >/dev/null 2>&1; do
            PAT=$((10#$PAT + 1))
          done
          NEW_TAG="v${MAJ}.${MIN}.${PAT}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "version=${NEW_TAG#v}" >> $GITHUB_OUTPUT

      - name: Update Cargo.toml
        run: |
          VER="${{ steps.version.outputs.version }}"
          awk -F'= ' '/^\[package\]/{p=1} p && /^version/{gsub(/"[^"]+"/,"\"'$VER'\""); p=0} 1' \
            Cargo.toml > tmp && mv tmp Cargo.toml

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          TAG="${{ steps.version.outputs.new_tag }}"
          SHA256="${{ env.SHA256 }}"
          
          git config user.email "aktags-bot@akinus21.com"
          git config user.name "AkTags Bot"
          git add Cargo.toml
          git commit -m "chore: bump version to ${TAG#v}" || true
          git push origin main 2>/dev/null || true
          
          git tag -fa "$TAG" -m "Release $TAG" 2>/dev/null || \
            (git tag -d "$TAG" 2>/dev/null; git tag -a "$TAG" -m "Release $TAG")
          git push origin "$TAG" --force 2>/dev/null || true
          
          gh release create "$TAG" \
            --title "$TAG (build #${{ github.run_number }})" \
            --notes "SHA256: $SHA256" \
            ./akai-agent 2>/dev/null || true

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "TAP_TOKEN not set, skipping Homebrew update"
            exit 0
          fi
          TAG="${{ steps.version.outputs.new_tag }}"
          SHA256="${{ env.SHA256 }}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          
          TAP="/tmp/homebrew-tap"
          rm -rf "$TAP"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/Akinus21/homebrew-tap.git" "$TAP" 2>/dev/null || exit 0
          
          mkdir -p "$TAP/Formula"
          printf '%s\n' \
            'class AkaiAgent < Formula' \
            '  desc "Remote GPU worker agent for the akai-net distributed inference system"' \
            '  homepage "https://github.com/Akinus21/akai-agent"' \
            "  version \"${TAG#v}\"" \
            '  license "MIT"' \
            '  depends_on "cmake"' \
            '  depends_on "gcc"' \
            '  depends_on "git"' \
            '  on_linux do' \
            "    url \"${BASE}/akai-agent\"" \
            "    sha256 \"${SHA256}\"" \
            '  end' \
            '  def install' \
            '    bin.install "akai-agent" => "akai-agent"' \
            '  end' \
            '  test do' \
            '    assert_match "akai-agent", shell_output("#{bin}/akai-agent --help")' \
            '  end' \
            'end' \
            > "$TAP/Formula/akai-agent.rb"
          cd "$TAP"
          git config user.email "aktags-bot@akinus21.com"
          git config user.name "AkTags Bot"
          git add Formula/akai-agent.rb
          git commit -m "Update akai-agent to ${TAG}" || true
          git push origin master 2>/dev/null || true